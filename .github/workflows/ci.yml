name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  test:
    runs-on: ubuntu-latest
    needs:
      - pre-commit
    env:
      DATABASE_URL: postgresql://app_user:app_password@localhost:5432/app_db
      TEST_DATABASE_URL: postgresql://app_user:app_password@localhost:5433/app_test_db
      SECRET_KEY: test-secret-key-for-ci-only
      ENVIRONMENT: test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_DB: 0
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: uploads
      S3_REGION_NAME: us-east-1
      COVERAGE_FILE: /tmp/.coverage

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Create env file for compose
        run: |
          cat > .env <<EOF
          DATABASE_URL=postgresql://app_user:app_password@db:5432/app_db
          TEST_DATABASE_URL=postgresql://app_user:app_password@test_db:5432/app_test_db
          SECRET_KEY=test-secret-key-for-ci-only
          S3_ACCESS_KEY_ID=minioadmin
          S3_SECRET_ACCESS_KEY=minioadmin
          EOF

      - name: Start test dependencies
        run: docker compose up -d db test_db redis minio

      - name: Show dependency containers
        run: docker compose ps

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Stop containers
        if: always()
        run: docker compose down

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: |
            starter-backend-template-api:ci-${{ github.sha }}
            starter-backend-template-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: starter-backend-template-api:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
