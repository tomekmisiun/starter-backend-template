name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  policy-guards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}"

      - name: Run policy guards
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: bash scripts/ci/run_policy_guards.sh

  secrets-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    needs:
      - pre-commit
      - policy-guards
    env:
      TEST_DATABASE_URL: postgresql://app_user:app_password@localhost:5433/app_test_db
      SECRET_KEY: test-secret-key-for-ci-only
      ENVIRONMENT: test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_DB: 0
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: uploads
      S3_REGION_NAME: us-east-1
      COVERAGE_FILE: /tmp/.coverage

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Create env file for compose
        run: |
          cat > .env <<EOF
          DATABASE_URL=postgresql://app_user:app_password@db:5432/app_db
          TEST_DATABASE_URL=postgresql://app_user:app_password@test_db:5432/app_test_db
          SECRET_KEY=test-secret-key-for-ci-only
          S3_ACCESS_KEY_ID=minioadmin
          S3_SECRET_ACCESS_KEY=minioadmin
          EOF

      - name: Start test dependencies
        run: docker compose up -d db test_db redis minio

      - name: Prepare app database for backup rehearsal
        run: docker compose run --rm api alembic upgrade head

      - name: Rehearse database backup and restore
        run: |
          make db-backup
          make db-restore-check

      - name: Show dependency containers
        run: docker compose ps

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=85 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Stop containers
        if: always()
        run: docker compose down

  load-smoke:
    runs-on: ubuntu-latest
    needs:
      - test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create env file for compose
        run: |
          cat > .env <<EOF
          DATABASE_URL=postgresql://app_user:app_password@db:5432/app_db
          TEST_DATABASE_URL=postgresql://app_user:app_password@test_db:5432/app_test_db
          SECRET_KEY=test-secret-key-for-ci-only
          S3_ACCESS_KEY_ID=minioadmin
          S3_SECRET_ACCESS_KEY=minioadmin
          EOF

      - name: Start API stack for load smoke
        run: docker compose up -d db redis api

      - name: Wait for API health
        run: |
          for attempt in $(seq 1 30); do
            if docker compose exec -T api python -c "import httpx; httpx.get('http://api:8000/health', timeout=2).raise_for_status()"; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          exit 1

      - name: Run load threshold smoke check
        run: |
          docker compose run --rm api python -m perf.load_baseline \
            --base-url http://api:8000 \
            --profile health \
            --check-thresholds \
            --requests 30 \
            --concurrency 3

      - name: Stop containers
        if: always()
        run: docker compose down

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: production
          push: false
          load: true
          tags: |
            fastapi-production-foundation-api:ci-${{ github.sha }}
            fastapi-production-foundation-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify production image excludes dev dependencies
        run: |
          docker run --rm \
            -e SECRET_KEY=test-secret-key-for-ci-only \
            -e ENVIRONMENT=test \
            fastapi-production-foundation-api:latest \
            python -c "import importlib.util; assert importlib.util.find_spec('pytest') is None"

          docker run --rm \
            -e SECRET_KEY=test-secret-key-for-ci-only \
            -e ENVIRONMENT=test \
            fastapi-production-foundation-api:latest \
            python -c "import fastapi, uvicorn, app.main"

          docker run --rm \
            fastapi-production-foundation-api:latest \
            python -c "import sys; assert sys.version_info[:2] == (3, 13), sys.version"

      - name: Enforce Trivy policy on API image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: fastapi-production-foundation-api:latest
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate Trivy SARIF report
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        continue-on-error: true
        with:
          image-ref: fastapi-production-foundation-api:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
