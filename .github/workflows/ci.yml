name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create env file
        run: |
          cat > .env <<EOF
          DATABASE_URL=postgresql://app_user:app_password@db:5432/app_db
          TEST_DATABASE_URL=postgresql://app_user:app_password@test_db:5432/app_test_db
          SECRET_KEY=test-secret-key
          EOF

      - name: Build containers
        run: docker compose build

      - name: Start dependencies
        run: docker compose up -d db test_db redis

      - name: Run lint
        run: docker compose run --rm api ruff check .

      - name: Run Redis-backed tests
        run: docker compose run --rm api pytest -v tests/test_rate_limit.py

      - name: Run tests
        run: docker compose run --rm api pytest -v

      - name: Stop containers
        if: always()
        run: docker compose down
