name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  test:
    runs-on: ubuntu-latest
    needs:
      - pre-commit

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create env file
        run: |
          cat > .env <<EOF
          DATABASE_URL=postgresql://app_user:app_password@db:5432/app_db
          TEST_DATABASE_URL=postgresql://app_user:app_password@test_db:5432/app_test_db
          SECRET_KEY=test-secret-key
          EOF

      - name: Build containers
        run: docker compose build

      - name: Start dependencies
        run: docker compose up -d db test_db redis minio

      - name: Run Redis-backed tests
        run: docker compose run --rm api pytest -v tests/test_rate_limit.py

      - name: Run tests with coverage
        run: |
          docker compose run --rm --user root api pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Stop containers
        if: always()
        run: docker compose down

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - test

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: |
            starter-backend-template-api:ci-${{ github.sha }}
            starter-backend-template-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: starter-backend-template-api:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
