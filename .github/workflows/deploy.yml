name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: Container image tag to deploy
        required: true
        default: latest

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate deployment inputs
        run: |
          echo "Deploying image tag '${{ inputs.image_tag }}' to '${{ inputs.environment }}'."

      - name: Deployment placeholder
        run: |
          echo "Replace this step with your platform-specific deployment command."
          echo "Examples: kubectl rollout, PaaS deploy hook, or SSH + docker compose pull/up."
          echo "Image reference: ghcr.io/${GITHUB_REPOSITORY,,}/api:${{ inputs.image_tag }}"
