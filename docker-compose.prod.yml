services:
  api:
    image: ${API_IMAGE:?Set API_IMAGE to the promoted container image reference}
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env

  worker:
    image: ${API_IMAGE:?Set API_IMAGE to the promoted container image reference}
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
