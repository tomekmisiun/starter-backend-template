# Minimal production Compose manifest for promoted API and worker containers.
# Does not include PostgreSQL, Redis, object storage, TLS, or migrations.
# API process defaults to single-process Uvicorn; override command for multi-worker
# Uvicorn or Gunicorn — see docs/production-runtime-examples.md.
services:
  api:
    image: ${API_IMAGE:?Set API_IMAGE to the promoted container image reference}
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env

  worker:
    image: ${API_IMAGE:?Set API_IMAGE to the promoted container image reference}
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
