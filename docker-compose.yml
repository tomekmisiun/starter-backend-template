services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      RUFF_CACHE_DIR: /tmp/.ruff_cache
      PYTEST_ADDOPTS: "-o cache_dir=/tmp/.pytest_cache"
    depends_on:
      - db
      - test_db
      - redis
    volumes:
      - .:/app

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    environment:
      RUFF_CACHE_DIR: /tmp/.ruff_cache
      PYTEST_ADDOPTS: "-o cache_dir=/tmp/.pytest_cache"
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  test_db:
    image: postgres:17
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: app_test_db
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
