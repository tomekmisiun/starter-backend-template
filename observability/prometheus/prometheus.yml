global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000

  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:9100
